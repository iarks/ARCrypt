<!-- secret key -->

<mat-card appearance="outlined">

  <mat-card-content>
    <mat-form-field appearance="outline">
      <mat-label>Secret Key</mat-label>
      <input
             #password
             [type]="showPassword ? 'text':'password'"
             [formControl]="control"
             matInput
             placeholder="Secret Key"
             />
      <button mat-icon-button
              matSuffix
              (click)="togglePasswordVisibility()"
              [attr.aria-label]="'Toggle password visibility'"
              [attr.aria-pressed]="showPassword">
        <mat-icon matTooltip="Toggle secret key visibility">{{ !showPassword ? 'visibility_off' : 'visibility' }}</mat-icon>
      </button>
      


      <mat-error *ngIf="control.hasError('required')">Required</mat-error>

    </mat-form-field>
  </mat-card-content>
  <mat-card-actions align="end">

    <div style="width:100%; display:flex; padding: 8px">

      <mat-icon matPrefix matTooltip="The secret which is used to generate the key for encrypting the plaintext">vpn_key</mat-icon>


    </div>

    <button type="button" mat-icon-button (click)="generateRandom($event)">
      <mat-icon>refresh</mat-icon>
    </button>
    <button type="button" mat-icon-button (click)="copyToClipboard($event)">
      <mat-icon>content_copy</mat-icon>
    </button>

    <button type="button" mat-icon-button (click)="paste($event)">
      <mat-icon>content_paste</mat-icon>
    </button>
    <button type="button" mat-icon-button (click)="clear($event)">
      <mat-icon>close</mat-icon>
    </button>
  </mat-card-actions>
</mat-card>
